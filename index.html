.hdr{padding:14px 18px 0;border-bottom:0.5px solid #e5e7eb}

.sync-dot.spin{background:#f59e0b;animation:pulse 1s infinite}

.tabs{display:flex;gap:0;overflow-x:auto}
.tab{padding:9px 13px;font-size:12px;cursor:pointer;border:none;background:transparent;color:#6b7280;border-bottom:2px solid transparent;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.tab.on{color:#0d9488;border-bottom-color:#0d9488;font-weight:500}
.tab:hover:not(.on){color:#111;border-bottom-color:#d1d5db}
.bdg{font-size:10px;padding:0 5px;border-radius:8px;background:#fef3c7;color:#92400e;font-weight:600;line-height:16px}
.bdg.g{background:#dcfce7;color:#15803d}
.body{padding:14px 18px}
.card{border:0.5px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:8px;background:#fff}
.card.muted{background:#f9fafb}
.card.ok{background:#f0fdf4;border-color:#86efac}
.card.warn{background:#fefce8;border-color:#fde047}
.card.err{background:#fef2f2;border-color:#fca5a5}

.btn{padding:6px 12px;border-radius:7px;border:0.5px solid #d1d5db;background:#fff;cursor:pointer;font-size:12px;color:#111;display:inline-flex;align-items:center;gap:4px}

async function sbFetch(path, opts={}){
  const {prefer, extraHeaders, ...fetchOpts} = opts;
  const headers = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer '+SB_KEY,
    'Content-Type': 'application/json',
  };
  if(prefer !== '') headers['Prefer'] = prefer || 'return=representation';
  const r = await fetch(SB_URL+'/rest/v1/'+path, {
    ...fetchOpts,
    headers
  });
  if(!r.ok){ const t=await r.text(); throw new Error(t); }
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

// Guardar semanas en Supabase
async function syncSemanas(){
  setSyncStatus('spin');
  try{
    await sbFetch('semanas?id=gte.0', {method:'DELETE', prefer:''});
    if(S.weeks.length){
      await sbFetch('semanas', {

        prefer:'resolution=merge-duplicates',
        body: JSON.stringify(S.weeks.map(w=>({id:w.id, datos:w})))
      });
    }
    setSyncStatus('ok');
  }catch(e){ console.error(e); setSyncStatus('err'); }
}

// Cargar todo desde Supabase
async function loadFromSupabase(){
  setSyncStatus('spin');
  try{
    const [hRows, sRows] = await Promise.all([
      sbFetch('hermanos?order=id'),
      sbFetch('semanas?order=id')
    ]);
    if(hRows && hRows.length){
      S.people = hRows.map(r=>({id:r.id, n:r.nombre, g:r.genero, r:r.tipo||''}));
      S.nextId = Math.max(...S.people.map(p=>p.id), 200)+1;
    }
    if(sRows && sRows.length){
      S.weeks = sRows.map(r=>r.datos);
    }
    setSyncStatus('ok');
  }catch(e){ console.error(e); setSyncStatus('err'); }
  render();
}

function setSyncStatus(st){
  const d=document.getElementById('sync-dot');
  if(d){ d.className='sync-dot '+st; d.title=st==='ok'?'Sincronizado':st==='err'?'Error de conexión':'Sincronizando...'; }
}

const RESTRICTED_ROLES=new Set(['anciano','siervo']);

function getPool(partId,secKey,partTitle){
  const restricted=S.people.filter(p=>RESTRICTED_ROLES.has(p.r));
  const menOnly=S.people.filter(p=>p.g==='M');
  const all=S.people;
  if(partId==='presidente') return restricted;
  if(/lectura de la biblia/i.test(partTitle)) return menOnly;
  if(secKey==='T') return restricted;
  if(secKey==='C') return restricted;
  if(/discurso/i.test(partTitle)) return menOnly;
  return all;
}
function getAssistPool(partTitle){
  if(/estudio b.blico/i.test(partTitle)) return S.people.filter(p=>p.g==='M');
  return S.people;
}
function buildSearchSelect(inputId,hiddenId,pool,selectedId,placeholder){
  const sel=pool.find(p=>p.id===selectedId);
  return `<div class="search-wrap">
    <input type="text" class="search-inp" id="${inputId}" value="${sel?sel.n:''}" placeholder="${placeholder}" autocomplete="off" data-hidden="${hiddenId}" style="font-size:11px;padding:4px 6px;width:100%">
    <input type="hidden" id="${hiddenId}" value="${selectedId||''}">
    <div class="search-drop" id="drop-${inputId}"></div>
  </div>`;
}

function buildAssignments(){
  const {weeks,activeWk}=S;
  if(!weeks.length) return `<div style="text-align:center;padding:40px;color:#6b7280"><div style="font-size:32px;margin-bottom:8px;opacity:.4">📋</div><div style="font-weight:500">Sin programa cargado</div><div style="font-size:12px;margin-top:4px">Ve a "Programa" → "Cargar Mayo–Junio 2026"</div></div>`;

  const wkBtns=weeks.map((w,i)=>{
    const tipo=w.tipo||'normal';
    const miss=tipo==='asamblea'?0:w.parts.filter(p=>!p.at).length+(!w.presidente?1:0)+(!w.oracion?1:0);
    const tipoCls=tipo==='asamblea'?'asamblea':tipo==='viajante'?'viajante':'';
    const tipoIcon=tipo==='asamblea'?'🏛️ ':tipo==='viajante'?'✈️ ':'';
    return `<button class="wk-btn ${activeWk===i?'on':''} ${tipoCls}" data-a="setWk" data-i="${i}">
      ${tipoIcon}${w.dateRange.split(' de ')[0]} ${w.dateRange.includes('junio')?'jun':w.dateRange.includes('julio')?'jul':'may'}
      ${miss?`<span class="bdg">${miss}</span>`:''}
    </button>`;
  }).join('');

  const w=weeks[activeWk];
  const tipo=w.tipo||'normal';

  // ── Selector de tipo de semana ──
  const tipoSelector=`
    <div style="padding:10px 12px;background:#f9fafb;border-bottom:0.5px solid #e5e7eb;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;color:#6b7280;font-weight:600;margin-right:4px">Tipo de semana:</span>
      <button class="btn sm ${tipo==='normal'?'p':''}" data-a="setTipo" data-v="normal">📋 Normal</button>
      <button class="btn sm ${tipo==='asamblea'?'p':''}" data-a="setTipo" data-v="asamblea" style="${tipo==='asamblea'?'background:#f59e0b;border:none':''}">🏛️ Asamblea</button>
      <button class="btn sm ${tipo==='viajante'?'p':''}" data-a="setTipo" data-v="viajante" style="${tipo==='viajante'?'background:#3b82f6;border:none':''}">✈️ Visita viajante</button>
    </div>`;

  // ── Semana de ASAMBLEA ──
  if(tipo==='asamblea'){
    return `
      <div class="wk-scroll no-print">${wkBtns}</div>
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:10px 12px;background:#f9fafb;border-bottom:0.5px solid #e5e7eb">
          <div style="font-weight:500">Semana del ${w.dateRange}</div>
          <div style="font-size:11px;color:#6b7280">${w.reading}</div>
        </div>
        ${tipoSelector}
        <div style="padding:32px;text-align:center">
          <div style="font-size:40px;margin-bottom:10px">🏛️</div>
          <div style="font-weight:600;font-size:15px;color:#92400e;margin-bottom:6px">Semana de Asamblea</div>
          <div style="font-size:13px;color:#6b7280">No hay reunión entre semana.<br>Esta semana no requiere programación.</div>
        </div>
      </div>`;
  }

  // ── Partes según tipo (normal o viajante) ──
  // Para visita del viajante: quitar estudio bíblico y reemplazar por discurso del superintendente
  let partsToShow = w.parts;
  let visitanteNote = '';
  if(tipo==='viajante'){
    partsToShow = w.parts.map(p=>{
      if(/estudio b.blico de la congregaci.n/i.test(p.t)){
        return {...p, t:'Discurso del Superintendente de Circuito', d:'30 min.', asst:false, as:null, _viajante:true};
      }
      return p;
    });
    visitanteNote=`<div style="padding:8px 12px;background:#eff6ff;border-bottom:0.5px solid #93c5fd;font-size:11px;color:#1d4ed8;display:flex;gap:6px;align-items:center">
      ✈️ <strong>Visita del Superintendente de Circuito</strong> — El estudio bíblico es reemplazado por el discurso del viajante.
    </div>`;
  }

  const presPool=S.people.filter(p=>RESTRICTED_ROLES.has(p.r));
  const presRow=`
    <div style="padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:#f5f3ff;color:#6d28d9;border-top:0.5px solid #e5e7eb">Presidencia · solo Anciano / Siervo</div>
    <div class="part-row">
      <div class="part-num" style="color:#6d28d9">★</div>
      <div class="part-info"><div class="part-title">Presidente</div><div class="part-sub">Dirige toda la reunión</div></div>
      <div class="part-assign" style="min-width:185px">${buildSearchSelect('si-presidente','hv-presidente',presPool,w.presidente||null,'— Anciano / Siervo —')}</div>
    </div>`;

  const secKeys=['T','S','C'];
  const secRows=secKeys.map(sk=>{
    const parts=partsToShow.filter(p=>p.s===sk);
    if(!parts.length) return '';
    const sec=SECS[sk];
    const pRows=parts.map(p=>{
      // Discurso del viajante: solo anciano/siervo, sin ayudante
      const pool=p._viajante?S.people.filter(x=>RESTRICTED_ROLES.has(x.r)):getPool(p.id,sk,p.t);
      const aPool=getAssistPool(p.t);
      const assistLabel=/estudio b.blico/i.test(p.t)?'— Lector (hombre) —':'— Ayudante —';
      const placeholder=p._viajante?'— Superintendente (viajante) —':'— Buscar hermano/a —';
      return `<div class="part-row" ${p._viajante?'style="background:#f0f9ff"':''}>
        <div class="part-num" style="color:${sec.color}">${p.n}</div>
        <div class="part-info">
          <div class="part-title">${p.t}${p._viajante?' <span style="font-size:10px;background:#dbeafe;color:#1d4ed8;padding:1px 5px;border-radius:4px">Viajante</span>':''}</div>
          <div class="part-sub">${p.d}${isStudentPart(p)?` · <button class="btn sm no-print" data-a="boleta" data-wk="${activeWk}" data-part="${p.id}" style="padding:2px 6px;font-size:10px;color:#073a7a;border-color:#93c5fd;background:#eff6ff">📋 Boleta</button>`:''}</div>
        </div>
        <div class="part-assign" style="min-width:185px">
          ${buildSearchSelect('si-'+p.id,'hv-'+p.id,pool,p.at,placeholder)}
          ${p.asst&&!p._viajante?buildSearchSelect('si-as-'+p.id,'hv-as-'+p.id,aPool,p.as,assistLabel):''}
        </div>
      </div>`;
    }).join('');
    const middleSongBar=sk==='C'&&w.middleSong?`<div style="padding:5px 12px;font-size:11px;color:#6b7280;background:#f9fafb;border-top:0.5px solid #e5e7eb">♪ Canción ${w.middleSong} y oración</div>`:'';
    return `${middleSongBar}<div class="sec-bar" style="background:${sec.bg};color:${sec.color}">${sec.label}</div>${pRows}`;
  }).join('');

  const oracionRow=`
    <div style="padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:#f0fdf4;color:#065f46;border-top:0.5px solid #e5e7eb">Oración final · solo hombres</div>
    <div class="part-row">
      <div class="part-num" style="color:#065f46">🙏</div>
      <div class="part-info"><div class="part-title">Oración final</div><div class="part-sub">Cierre · ♪ Canción ${w.closeSong||'—'}</div></div>
      <div class="part-assign" style="min-width:185px">${buildSearchSelect('si-oracion','hv-oracion',S.people.filter(p=>p.g==='M'),w.oracion||null,'— Buscar hermano (hombre) —')}</div>
    </div>`;

  const totalParts=w.parts.length+2;
  const done=w.parts.filter(p=>p.at).length+(w.presidente?1:0)+(w.oracion?1:0);
  const pct=Math.round(done/totalParts*100);

  return `
    <div class="wk-scroll no-print">${wkBtns}</div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:10px 12px;background:#f9fafb;border-bottom:0.5px solid #e5e7eb">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:500">Semana del ${w.dateRange}</div>
            <div style="font-size:11px;color:#6b7280">${w.reading}${w.openSong?` · ♪ ${w.openSong} / ${w.middleSong||'—'} / ${w.closeSong}`:''}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:600;color:${pct===100?'#15803d':'#b45309'}">${pct}%</div>
            <div style="font-size:11px;color:#6b7280">${done}/${totalParts}</div>
          </div>
        </div>
        <div class="prog"><div class="prog-f" style="width:${pct}%;background:${pct===100?'#22c55e':'#0d9488'}"></div></div>
      </div>
      ${tipoSelector}
      ${visitanteNote}
      ${presRow}${secRows}${oracionRow}
    </div>`;
}

function buildGenerate(){
  const {weeks,showPreview}=S;
  if(!weeks.length) return `<div style="text-align:center;padding:40px;color:#6b7280"><div style="font-size:32px;opacity:.4;margin-bottom:8px">🖨️</div><div style="font-weight:500">Sin programa cargado</div></div>`;
  const validations=weeks.map(w=>({w,missing:w.parts.filter(p=>!p.at).map(p=>`${p.n}. ${p.t}`)}));
  const totalMissing=validations.reduce((s,v)=>s+v.missing.length,0);
  const allOk=totalMissing===0;
  const statusCard=allOk
    ?`<div class="card ok" style="display:flex;gap:10px;padding:12px;margin-bottom:10px"><span style="color:#15803d">${I.ok(18)}</span><div><div style="font-weight:500;color:#15803d">Todo completo</div><div style="font-size:12px;color:#16a34a">Todas las partes de las ${weeks.length} semanas están asignadas.</div></div></div>`
    :`<div class="card warn" style="margin-bottom:10px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><span style="color:#b45309">${I.warn()}</span><span style="font-weight:500;color:#b45309">${totalMissing} parte(s) sin asignar</span></div>${validations.filter(v=>v.missing.length).map(({w,missing})=>`<div style="margin-bottom:6px"><div style="font-size:11px;font-weight:600;color:#92400e">Semana del ${w.dateRange}:</div>${missing.map(m=>`<div style="font-size:11px;color:#b45309;padding-left:10px">• ${m}</div>`).join('')}</div>`).join('')}</div>`;
  const statsCards=weeks.map(w=>{
    const done=w.parts.filter(p=>p.at).length;
    const pct=Math.round(done/w.parts.length*100);
    return `<div class="card" style="padding:10px"><div style="font-size:10px;color:#6b7280">${w.dateRange}</div><div style="font-size:20px;font-weight:500;color:${pct===100?'#15803d':'#b45309'}">${pct}%</div><div class="prog"><div class="prog-f" style="width:${pct}%;background:${pct===100?'#22c55e':'#f59e0b'}"></div></div></div>`;
  }).join('');
  const preview=showPreview?buildPrintHTML():'';
  return `
    ${statusCard}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px">${statsCards}</div>
    <div class="btn-row no-print">
      <button class="btn p" data-a="print">${I.print()} Imprimir programa</button>
      <button class="btn" data-a="printSlips">${I.print()} Imprimir boletas</button>
      <button class="btn" data-a="togglePreview">${showPreview?'Ocultar':'Vista previa'}</button>
    </div>
    ${preview?`<div style="margin-top:12px;border:0.5px solid #d1d5db;border-radius:8px;overflow:hidden">${preview}</div>`:''}`;
}

function buildPrintHTML(){
  const {weeks,people}=S;
  const pName=id=>{const p=people.find(x=>x.id===id);return p?p.n:'—';};
  function addMin(base,mins){const[h,m]=base.split(':').map(Number);const t=h*60+m+mins;return `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;}
  function parseMins(dur){const m=String(dur).match(/(\d+)/);return m?parseInt(m[1]):0;}

  const AZUL='#073a7a';
  const SEC={
    T:{bg:'#3b7d8a',label:'TESOROS DE LA BIBLIA'},
    S:{bg:'#d48f01',label:'SEAMOS MEJORES MAESTROS'},
    C:{bg:'#bd2e12',label:'NUESTRA VIDA CRISTIANA'},
  };

  // LAYOUT DE TABLA: 3 columnas fijas
  // col1: 34px  (hora)
  // col2: auto  (título — ocupa todo el espacio restante, hace wrap si es largo)
  // col3: 130px (nombre — columna derecha fija, alineado a la izquierda, no se mueve)

  const tdHora  = `style="width:34px;font-family:'Poppins',sans-serif;font-size:7.5px;font-weight:700;color:${AZUL};padding:3px 4px 3px 8px;white-space:nowrap;vertical-align:top"`;
  const tdTit   = `style="font-family:'Poppins',sans-serif;font-size:8px;color:#222;padding:3px 10px 3px 0;vertical-align:top"`;
  const tdTitIt = `style="font-family:'Poppins',sans-serif;font-size:8px;font-style:italic;color:#555;padding:3px 10px 3px 0;vertical-align:top"`;
  const tdNom   = `style="width:130px;font-family:'Poppins',sans-serif;font-size:8.5px;font-weight:700;color:${AZUL};padding:3px 10px 3px 0;vertical-align:top;text-align:left;word-wrap:break-word"`;
  const tdNomEmpty = `style="width:130px;padding:3px 10px 3px 0;vertical-align:top"`;

  function filaSimple(hora, texto){
    return `<tr>
      <td ${tdHora}>${hora}</td>
      <td colspan="2" ${tdTitIt}>${texto}</td>
    </tr>`;
  }

  function filaParte(hora, num, titulo, dur, nombre){
    const tituloHtml = `<b>${num}.</b> ${titulo} <span style="font-size:7px;color:#999">(${dur})</span>`;
    if(nombre){
      return `<tr>
        <td ${tdHora}>${hora}</td>
        <td ${tdTit}>${tituloHtml}</td>
        <td ${tdNom}>${nombre}</td>
      </tr>`;
    }
    return `<tr>
      <td ${tdHora}>${hora}</td>
      <td ${tdTit}>${tituloHtml}</td>
      <td ${tdNomEmpty}><span style="font-family:'Poppins',sans-serif;font-size:7px;font-weight:600;color:#bd2e12">SIN ASIGNAR</span></td>
    </tr>`;
  }

  function filaOracion(hora, cancion, nombre){
    const texto = `&#9835; Canción ${cancion} y oración`;
    if(nombre){
      return `<tr>
        <td ${tdHora}>${hora}</td>
        <td ${tdTitIt}>${texto}</td>
        <td ${tdNom}>${nombre}</td>
      </tr>`;
    }
    return `<tr>
      <td ${tdHora}>${hora}</td>
      <td colspan="2" ${tdTitIt}>${texto}</td>
    </tr>`;
  }

  function secBar(sec){
    return `<tr>
      <td colspan="3" style="background:${sec.bg};padding:3.5px 8px">
        <span style="font-family:'Poppins',sans-serif;font-size:7px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em">${sec.label}</span>
      </td>
    </tr>`;
  }

  function buildWeekBlock(w){
    if((w.tipo||'normal')==='asamblea'){
      return `<div style="border:1.5px solid #d48f01;border-radius:4px;overflow:hidden;break-inside:avoid">
        <div style="background:#d48f01;padding:6px 10px">
          <span style="font-family:'Poppins',sans-serif;font-weight:700;font-size:9.5px;color:#fff;text-transform:uppercase">&#127963; ${w.dateRange.toUpperCase()} — SEMANA DE ASAMBLEA</span>
        </div>
        <div style="padding:12px;text-align:center;background:#fffbeb">
          <span style="font-family:'Poppins',sans-serif;font-size:9px;color:#7D6608;font-weight:600">Sin reunión entre semana</span>
        </div>
      </div>`;
    }

    const esViajante=(w.tipo||'normal')==='viajante';
    if(esViajante){
      w={...w,parts:w.parts.map(p=>/estudio b.blico de la congregaci.n/i.test(p.t)?{...p,t:'Discurso del Superintendente de Circuito',asst:false,as:null}:p)};
    }

    let clock='17:00';
    let rows='';

    rows += filaSimple(clock,`&#9835; Canción ${w.openSong||'—'} y oración`);
    clock=addMin(clock,5);
    rows += filaSimple(clock,'Palabras de introducción (1 min.)');
    clock=addMin(clock,1);

    let prevSec=null;
    w.parts.forEach(p=>{
      if(p.s!==prevSec){
        if(p.s==='C'){
          rows+=filaSimple(clock,`&#9835; Canción ${w.middleSong||'—'} y oración`);
          clock=addMin(clock,5);
        }
        rows+=secBar(SEC[p.s]);
        prevSec=p.s;
      }
      const person=p.at?pName(p.at):null;
      const asst=p.as?pName(p.as):null;
      const nameStr=person?(asst?person+' / '+asst:person):null;
      rows+=filaParte(clock,p.n,p.t,p.d,nameStr);
      clock=addMin(clock,parseMins(p.d));
    });

    rows+=filaSimple(clock,'Palabras de conclusión');
    clock=addMin(clock,1);
    const orPerson=w.oracion?pName(w.oracion):null;
    rows+=filaOracion(clock,w.closeSong||'—',orPerson);

    const presNombre=w.presidente?pName(w.presidente):'—';

    return `<div style="display:flex;border:1.5px solid #c8d6e5;border-radius:4px;overflow:hidden;break-inside:avoid">
      <div style="background:${AZUL};width:14px;flex-shrink:0;position:relative;overflow:hidden">
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-90deg);white-space:nowrap;font-family:'Poppins',sans-serif;font-size:5px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em">REUNIÓN VIDA Y MINISTERIO CRISTIANOS</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="background:${AZUL};padding:5px 10px;display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div style="font-family:'Poppins',sans-serif;font-weight:700;font-size:9px;color:#fff;text-transform:uppercase;letter-spacing:.03em">${w.dateRange.toUpperCase()} — ${w.reading.toUpperCase()}</div>
          <div style="font-family:'Poppins',sans-serif;font-size:7.5px;color:#b8d0f0;white-space:nowrap;flex-shrink:0">Presidente: <b style="color:#fff">${presNombre}</b></div>
        </div>
        <table style="width:100%;border-collapse:collapse;table-layout:fixed">
          <colgroup>
            <col style="width:34px">
            <col>
            <col style="width:130px">
          </colgroup>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }

  const pages=[];
  for(let i=0;i<weeks.length;i+=2) pages.push(weeks.slice(i,i+2));

  const pagesHtml=pages.map(pg=>`
    <div style="width:215.9mm;min-height:279.4mm;padding:8mm 10mm;box-sizing:border-box;background:#fff;page-break-after:always">
      <div style="text-align:center;margin-bottom:7px;padding-bottom:6px;border-bottom:2px solid ${AZUL}">
        <div style="font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;color:${AZUL};text-transform:uppercase;letter-spacing:.07em">Reunión Vida y Ministerio Cristianos</div>
        <div style="font-family:'Poppins',sans-serif;font-size:8.5px;color:#777;margin-top:1px">Congregación Nueva Valencia — Arauquita</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${pg.map(w=>buildWeekBlock(w)).join('')}
      </div>
      <div style="margin-top:6px;text-align:right;font-family:'Poppins',sans-serif;font-size:6.5px;color:#ccc">VJM Nueva Valencia</div>
    </div>`).join('');

  return `<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  @page{size:letter;margin:0}
  @media print{
    body{margin:0;padding:0}
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
    table{table-layout:fixed!important}
    td{overflow:hidden;word-wrap:break-word}
  }
</style>
${pagesHtml}`;
}

function isStudentPart(p){

function generateBoletaCanvas(data){
  // data: { nombre, ayudante, fecha, titulo, intervencion, sala }
  const scale=2, W=420, H=310;
  const c=document.createElement('canvas');
  c.width=W*scale; c.height=H*scale;
  const ctx=c.getContext('2d');
  ctx.scale(scale,scale);
  const BLUE='#073a7a', LBLUE='#b8d0f0', GRAY='#555', LINE='#d1d5db';
  // Fondo blanco
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  // Borde exterior
  ctx.strokeStyle='#334155'; ctx.lineWidth=1.5; ctx.strokeRect(3,3,W-6,H-6);
  // Encabezado azul
  ctx.fillStyle=BLUE; ctx.fillRect(3,3,W-6,56);
  // Barra lateral izquierda
  ctx.fillStyle='#0a4fa0'; ctx.fillRect(3,3,16,H-6);
  // Texto vertical barra
  ctx.save();
  ctx.fillStyle='#fff'; ctx.font='bold 7px Arial';
  ctx.textAlign='center';
  ctx.translate(11, H/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('REUNIÓN VIDA Y MINISTERIO CRISTIANOS', 0, 0);
  ctx.restore();
  // Título
  ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.font='bold 10px Arial';
  ctx.fillText('ASIGNACIÓN PARA LA REUNIÓN', W/2+8, 22);
  ctx.font='bold 12.5px Arial';
  ctx.fillText('VIDA Y MINISTERIO CRISTIANOS', W/2+8, 40);
  ctx.font='8px Arial'; ctx.fillStyle=LBLUE;
  ctx.fillText('Congregación Nueva Valencia', W/2+8, 54);
  // ── Campos ──
  const lx=26, rx=W-14, fieldW=rx-lx;
  let y=78;
  const lh=30;
  function drawField(label, value, x1, x2, yy){
    ctx.fillStyle=GRAY; ctx.font='7.5px Arial'; ctx.textAlign='left';
    ctx.fillText(label, x1, yy-10);
    ctx.strokeStyle=LINE; ctx.lineWidth=0.6;
    ctx.beginPath(); ctx.moveTo(x1,yy); ctx.lineTo(x2,yy); ctx.stroke();
    if(value){
      ctx.fillStyle='#0f172a'; ctx.font='bold 10px Arial';
      ctx.fillText(value, x1, yy-1);
    }
  }
  // Nombre (ancho completo)
  drawField('Nombre:', data.nombre||'', lx, rx, y); y+=lh;
  // Ayudante (ancho completo)
  drawField('Ayudante:', data.ayudante||'', lx, rx, y); y+=lh;
  // Fecha + Intervención num (mitad/mitad)
  const mid=lx+fieldW*0.52;
  drawField('Fecha:', data.fecha||'', lx, mid-8, y);
  drawField('Intervención núm.:', data.intervencion||'', mid+4, rx, y);
  y+=lh;
  // Intervención (título)
  drawField('Intervención:', data.titulo||'', lx, rx, y); y+=lh;
  // Se presentará en:
  ctx.fillStyle=GRAY; ctx.font='7.5px Arial'; ctx.textAlign='left';
  ctx.fillText('Se presentará en:', lx, y);
  y+=16;
  // Checkboxes salas
  const salas=[['principal','Sala principal'],['aux1','Sala auxiliar núm. 1'],['aux2','Sala auxiliar núm. 2']];
  const slotW=(rx-lx)/3;
  salas.forEach(([key,label],i)=>{
    const cx=lx+i*slotW;
    const checked=data.sala===key;
    ctx.strokeStyle=checked?BLUE:'#64748b'; ctx.lineWidth=0.8;
    ctx.strokeRect(cx,y-9,9,9);
    if(checked){ctx.fillStyle=BLUE;ctx.fillRect(cx+1.5,y-7.5,6,6);}
    ctx.fillStyle=checked?BLUE:'#334155'; ctx.font=checked?'bold 8px Arial':'8px Arial';
    ctx.fillText(label,cx+13,y-1);
  });
  y+=16;
  // Línea separadora
  ctx.strokeStyle=LINE; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(lx,y); ctx.lineTo(rx,y); ctx.stroke();
  y+=10;
  // Nota al estudiante
  ctx.fillStyle='#64748b'; ctx.font='6.5px Arial'; ctx.textAlign='left';
  ctx.fillText('Nota al estudiante: En la Guía de actividades encontrará la información que necesita para su',lx,y); y+=10;
  ctx.fillText('intervención. Repase también las indicaciones del formulario S-38.',lx,y); y+=14;
  // Footer
  ctx.fillStyle='#cbd5e1'; ctx.font='6px Arial'; ctx.textAlign='right';
  ctx.fillText('S-89-S',rx,y);
  return c;
}

function renderBoletaModal(){

  const w=S.weeks[weekIdx];
  const p=w?.parts.find(x=>String(x.id)===String(partId));
  if(!w||!p) return '';
  const person=p.at?S.people.find(x=>x.id===p.at):null;
  const asst=p.as?S.people.find(x=>x.id===p.as):null;
  const salaLabels={principal:'Sala principal',aux1:'Sala aux. 1',aux2:'Sala aux. 2'};

        <button class="btn" data-a="closeBoleta">Cerrar</button>
        <button class="btn p" data-a="downloadBoleta">⬇ Descargar imagen</button>
      </div>
    </div>

}

function paintBoleta(){
  const {boletaModal}=S;
  if(!boletaModal) return;
  const {weekIdx,partId,sala}=boletaModal;
  const w=S.weeks[weekIdx]; if(!w) return;
  const p=w.parts.find(x=>String(x.id)===String(partId)); if(!p) return;
  const person=p.at?S.people.find(x=>x.id===p.at):null;
  const asst=p.as?S.people.find(x=>x.id===p.as):null;
  const canvas=generateBoletaCanvas({
    nombre:person?person.n:'(sin asignar)',
    ayudante:asst?asst.n:'',
    fecha:w.dateRange,
    titulo:p.t,
    intervencion:String(p.n),
    sala:sala||'principal'
  });
  const wrap=document.getElementById('boleta-canvas-wrap');
  if(wrap){wrap.innerHTML='';wrap.appendChild(canvas);}
}


function buildApp(){
  const {tab,people,weeks}=S;
  const totMiss=weeks.reduce((s,w)=>s+w.parts.filter(p=>!p.at).length,0);
  const TABS=[
    {l:"Hermanos",i:"users",b:people.length,bc:"g"},
    {l:"Programa",i:"file",b:weeks.length||null,bc:"g"},
    {l:"Asignaciones",i:"grid",b:totMiss||null,bc:""},
    {l:"Generar",i:"print",b:null},
  ];
  const tabHtml=TABS.map((t,i)=>`<button class="tab ${tab===i?'on':''}" data-a="tab" data-i="${i}">${I[t.i]()} ${t.l}${t.b?`<span class="bdg ${t.bc}">${t.b}</span>`:''}</button>`).join('');
  let content='';
  if(tab===0) content=buildPeople();
  if(tab===1) content=buildProgram();
  if(tab===2) content=buildAssignments();
  if(tab===3) content=buildGenerate();
  return `

    ${renderBoletaModal()}`;
}

// ═══════════════════════════════════════════
function bind(){
  document.querySelectorAll('[data-a]').forEach(el=>{
    el.addEventListener(el.tagName==='SELECT'?'change':'click',handleEv);
  });
  document.getElementById('pdf-btn')?.addEventListener('click',()=>document.getElementById('pdf-file')?.click());
  document.getElementById('pdf-file')?.addEventListener('change',async e=>{
    const f=e.target.files[0]; if(!f) return;
    S.parseMsg={ok:false,msg:'Procesando PDF...'}; render();
    try{
      const buf=await f.arrayBuffer();
      const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
      let txt='';
      for(let i=1;i<=pdf.numPages;i++){
        const pg=await pdf.getPage(i);
        const ct=await pg.getTextContent();
        txt+=ct.items.map(x=>x.str).join(' ')+'\n';
      }
      const parsed=parsePDFText(txt);
      if(parsed&&parsed.length>0){
        S.weeks=parsed;
        S.parseMsg={ok:true,msg:`✓ ${parsed.length} semanas extraídas del PDF`};
      } else {
        S.weeks=JSON.parse(JSON.stringify(REAL_WEEKS));
        S.parseMsg={ok:false,msg:'⚠ No se pudieron extraer semanas del PDF. Se cargaron datos de Mayo–Junio 2026.'};
      }
    }catch(err){
      S.weeks=JSON.parse(JSON.stringify(REAL_WEEKS));
      S.parseMsg={ok:false,msg:`Error: ${err.message}. Se cargaron datos de Mayo–Junio 2026.`};
    }
    render(); queueSyncSemanas();
  });
  const dz=document.getElementById('dz');
  if(dz){
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
    dz.addEventListener('drop',e=>{
      e.preventDefault();dz.classList.remove('drag');
      const f=e.dataTransfer.files[0];
      if(f){const fi=document.getElementById('pdf-file');const dt=new DataTransfer();dt.items.add(f);fi.files=dt.files;fi.dispatchEvent(new Event('change'));}
    });
  }
  document.getElementById('pf-n')?.addEventListener('input',e=>S.pf.n=e.target.value);
  document.getElementById('pf-g')?.addEventListener('change',e=>S.pf.g=e.target.value);
  document.getElementById('pf-r')?.addEventListener('change',e=>S.pf.r=e.target.value);
  document.getElementById('xlsx-btn')?.addEventListener('click',()=>document.getElementById('xlsx-file')?.click());
  document.getElementById('xlsx-file')?.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;importExcel(f);e.target.value='';});
  document.querySelectorAll('.search-inp').forEach(inp=>{
    inp.addEventListener('input',handleSearchInput);
    inp.addEventListener('focus',handleSearchInput);
    inp.addEventListener('blur',()=>setTimeout(()=>{const d=document.getElementById('drop-'+inp.id);if(d)d.style.display='none';},200));
    inp.addEventListener('keydown',handleSearchKey);
  });
}

function handleEv(e){
  const el=e.currentTarget,a=el.dataset.a;
  switch(a){
    case 'tab': S.tab=parseInt(el.dataset.i); render(); break;
    case 'filt': S.filterG=el.dataset.v; render(); break;
    case 'saveP':{
      const n=document.getElementById('pf-n')?.value.trim();
      const g=document.getElementById('pf-g')?.value||S.pf.g;
      const r=document.getElementById('pf-r')?.value||'';
      if(!n) return;
      if(S.editId){S.people=S.people.map(p=>p.id===S.editId?{...p,n,g,r}:p);S.editId=null;}
      else S.people.push({id:++S.nextId,n,g,r});
      S.pf={n:'',g:'M',r:''}; render(); queueSyncHermanos(); break;
    }
    case 'cancelP': S.editId=null; S.pf={n:'',g:'M',r:''}; render(); break;
    case 'editP':{const p=S.people.find(x=>x.id===parseInt(el.dataset.id));if(p){S.editId=p.id;S.pf={n:p.n,g:p.g,r:p.r||''};render();} break;}
    case 'delP':{
      if(confirm('¿Eliminar este hermano/a?')){S.people=S.people.filter(p=>p.id!==parseInt(el.dataset.id));render();queueSyncHermanos();} break;
    }
    case 'loadReal':
      S.weeks=JSON.parse(JSON.stringify(REAL_WEEKS));
      S.parseMsg={ok:true,msg:'✓ 9 semanas cargadas: Mayo – Julio 2026'};
      render(); queueSyncSemanas(); break;
    case 'clearAll':
      if(confirm('¿Borrar todos los datos de la nube y empezar de cero?')){
        S.people=[];S.weeks=[];S.nextId=200;S.parseMsg=null;S.importMsg=null;
        render(); syncHermanos(); syncSemanas();
      } break;
    case 'toggleW':{const id=parseInt(el.dataset.id);S.expanded[id]=!S.expanded[id];render();break;}
    case 'setWk': S.activeWk=parseInt(el.dataset.i); render(); break;
    case 'setTipo':{
      const v=el.dataset.v;
      S.weeks=S.weeks.map((wk,i)=>i===S.activeWk?{...wk,tipo:v}:wk);
      render(); queueSyncSemanas(); break;
    }
    case 'togglePreview': S.showPreview=!S.showPreview; render(); break;
    case 'print':{const pv=document.getElementById('print-view');pv.innerHTML=buildPrintHTML();pv.style.display='block';window.print();setTimeout(()=>{pv.style.display='none';},2000);break;}
    case 'printSlips':{const pv=document.getElementById('print-view');pv.innerHTML=buildSlipsHTML();pv.style.display='block';window.print();setTimeout(()=>{pv.style.display='none';},2000);break;}
    case 'boleta':{
      S.boletaModal={weekIdx:parseInt(el.dataset.wk),partId:el.dataset.part,sala:'principal'};
      render();
      setTimeout(paintBoleta,0);
      break;
    }
    case 'closeBoleta': S.boletaModal=null; render(); break;
    case 'setSala':{
      if(S.boletaModal){S.boletaModal={...S.boletaModal,sala:el.dataset.v};render();setTimeout(paintBoleta,0);}
      break;
    }
    case 'downloadBoleta':{
      const wrap=document.getElementById('boleta-canvas-wrap');
      const canvas=wrap?.querySelector('canvas');
      if(!canvas) return;
      const {weekIdx,partId}=S.boletaModal;
      const w=S.weeks[weekIdx];
      const p=w?.parts.find(x=>String(x.id)===String(partId));
      const person=p?.at?S.people.find(x=>x.id===p.at):null;
      const nombre=person?person.n.replace(/\s+/g,'_'):'boleta';
      const a=document.createElement('a');
      a.href=canvas.toDataURL('image/png');
      a.download=`boleta_${nombre}_${(w?.dateRange||'').replace(/\s+/g,'_')}.png`;
      a.click();
      break;
    }
  }
}

function handleSearchInput(e){
  const inp=e.target,q=inp.value.toLowerCase().trim();
  const drop=document.getElementById('drop-'+inp.id);
  if(!drop) return;
  const pool=getPoolForInput(inp.id);
  const filtered=q?pool.filter(p=>p.n.toLowerCase().includes(q)):pool;
  drop.innerHTML='<div class="search-opt clear" data-val="">— Sin asignar —</div>'+
    filtered.map(p=>`<div class="search-opt" data-val="${p.id}">${p.g==='M'?'H':'M'} ${p.n}${p.r?' ('+p.r[0].toUpperCase()+p.r.slice(1)+')':''}</div>`).join('');
  drop.style.display='block';
  drop.querySelectorAll('.search-opt').forEach(opt=>{
    opt.addEventListener('mousedown',ev=>{
      ev.preventDefault();
      const val=opt.dataset.val;
      const hiddenId=inp.dataset.hidden;
      const pool2=getPoolForInput(inp.id);
      inp.value=val?pool2.find(p=>p.id===parseInt(val))?.n||'':'';
      document.getElementById(hiddenId).value=val;
      drop.style.display='none';
      commitSearchValue(inp.id,hiddenId,val);
    });
  });
}
function handleSearchKey(e){
  const inp=e.target,drop=document.getElementById('drop-'+inp.id);
  if(!drop||drop.style.display==='none') return;
  const opts=[...drop.querySelectorAll('.search-opt')];
  const hi=drop.querySelector('.search-opt.hi');
  let idx=hi?opts.indexOf(hi):-1;
  if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,opts.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);}
  else if(e.key==='Enter'&&hi){hi.dispatchEvent(new Event('mousedown'));return;}
  else if(e.key==='Escape'){drop.style.display='none';return;}
  opts.forEach((o,i)=>o.classList.toggle('hi',i===idx));
  if(opts[idx]) opts[idx].scrollIntoView({block:'nearest'});
}
function getPoolForInput(inputId){
  if(inputId==='si-presidente') return S.people.filter(p=>RESTRICTED_ROLES.has(p.r));
  if(inputId==='si-oracion') return S.people.filter(p=>p.g==='M');
  if(inputId.startsWith('si-as-')){
    const partId=inputId.replace('si-as-','');
    const w=S.weeks[S.activeWk];if(!w) return S.people;
    const part=w.parts.find(p=>String(p.id)===partId);
    return part?getAssistPool(part.t):S.people;
  }
  const partId=inputId.replace('si-','');
  const w=S.weeks[S.activeWk];if(!w) return S.people;
  const part=w.parts.find(p=>String(p.id)===partId);
  return part?getPool(part.id,part.s,part.t):S.people;
}
function commitSearchValue(inputId,hiddenId,val){
  const numVal=val?parseInt(val):null;
  if(inputId==='si-presidente'){S.weeks=S.weeks.map((wk,i)=>i===S.activeWk?{...wk,presidente:numVal}:wk);queueSyncSemanas();return;}
  if(inputId==='si-oracion'){S.weeks=S.weeks.map((wk,i)=>i===S.activeWk?{...wk,oracion:numVal}:wk);queueSyncSemanas();return;}
  const isAsst=inputId.startsWith('si-as-');
  const partId=inputId.replace('si-as-','').replace('si-','');
  const field=isAsst?'as':'at';
  S.weeks=S.weeks.map((wk,i)=>i!==S.activeWk?wk:{...wk,parts:wk.parts.map(p=>String(p.id)!==partId?p:{...p,[field]:numVal})});
  queueSyncSemanas();
}

// EXCEL IMPORTER
// ═══════════════════════════════════════════
function importExcel(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      let headerIdx=-1;
      for(let i=0;i<rows.length;i++){if(rows[i]&&rows[i].some(c=>typeof c==='string'&&c.toLowerCase().includes('nombre'))){headerIdx=i;break;}}
      if(headerIdx===-1){S.importMsg={ok:false,msg:'No se encontró fila de encabezado (Nombre) en el Excel.'};render();return;}
      const hdr=rows[headerIdx].map(c=>c?String(c).toLowerCase().trim():'');
      const colNombre=hdr.findIndex(c=>c.includes('nombre'));
      const colTipo=hdr.findIndex(c=>c.includes('tipo'));
      const colGenero=hdr.findIndex(c=>c.includes('genero')||c.includes('género')||c.includes('sexo'));
      const TIPO_MAP={'anciano':'anciano','siervo ministerial':'siervo','siervo':'siervo','precursor':'precursor','pionero':'precursor','precursora':'precursor','pionera':'precursor'};
      let added=0,skipped=0;
      const existing=new Set(S.people.map(p=>p.n.toLowerCase().trim()));
      for(let i=headerIdx+1;i<rows.length;i++){
        const row=rows[i];
        if(!row||!row[colNombre]) continue;
        const nombre=String(row[colNombre]).trim();
        if(!nombre||nombre.toLowerCase().includes('nombre')) continue;
        if(existing.has(nombre.toLowerCase())){skipped++;continue;}
        const tipoRaw=colTipo>=0&&row[colTipo]?String(row[colTipo]).toLowerCase().trim():'';
        const tipo=TIPO_MAP[tipoRaw]||'';
        let genero='M';
        if(colGenero>=0&&row[colGenero]){const gv=String(row[colGenero]).trim().toUpperCase();if(gv==='H')genero='M';else if(gv==='M')genero='F';}
        S.people.push({id:++S.nextId,n:nombre,g:genero,r:tipo});
        existing.add(nombre.toLowerCase());
        added++;
      }
      S.importMsg={ok:true,msg:`✓ ${added} hermano(s) importado(s)${skipped?` · ${skipped} ya existían`:''}.`};
      render(); queueSyncHermanos();
    }catch(err){S.importMsg={ok:false,msg:`Error al leer el Excel: ${err.message}`};render();}
  };
  reader.readAsArrayBuffer(file);
}

// ═══════════════════════════════════════════
// PDF PARSER
// ═══════════════════════════════════════════
function parsePDFText(raw){
  const text=raw.replace(/[\r\n]+/g,' ').replace(/\s{2,}/g,' ').trim();
  const MONTHS="ENERO|FEBRERO|MARZO|ABRIL|MAYO|JUNIO|JULIO|AGOSTO|SEPTIEMBRE|OCTUBRE|NOVIEMBRE|DICIEMBRE";
  const WK_RX=new RegExp(`(\\d{1,2}\\s*[-–]\\s*\\d{1,2}\\s+DE\\s+(?:${MONTHS})|\\d{1,2}\\s+DE\\s+(?:${MONTHS})\\s+A\\s+\\d{1,2}\\s+DE\\s+(?:${MONTHS}))`,'gi');
  const matches=[];let m;
  while((m=WK_RX.exec(text))!==null) matches.push({pos:m.index,header:m[0].trim()});
  if(matches.length===0) return null;
  const weeks=[];
  const SEC_RX={T:/TESOROS\s+DE\s+LA\s+BIBLIA/i,S:/SEAMOS\s+MEJORES\s+MAESTROS/i,C:/NUESTRA\s+VIDA\s+CRISTIANA/i};
  const SONG_OPEN_RX=/Canci[oó]n\s+(\d+)\s+y\s+oraci[oó]n/i;
  const SONG_CLOSE_RX=/Palabras\s+de\s+conclusi[oó]n[^|]*[|]\s*Canci[oó]n\s+(\d+)/i;
  for(let i=0;i<matches.length;i++){
    const start=matches[i].pos,end=i+1<matches.length?matches[i+1].pos:text.length;
    const block=text.slice(start,end);
    const oSong=block.match(SONG_OPEN_RX),cSong=block.match(SONG_CLOSE_RX);
    const headerFull=block.slice(0,100);
    const bookMatch=headerFull.match(/\|\s*([A-ZÁÉÍÓÚ][A-Za-záéíóúñÑ\s,]+\d[\d,\s-]*)/);
    const secPositions=[];
    for(const[k,rx]of Object.entries(SEC_RX)){const sm=rx.exec(block);if(sm)secPositions.push({sec:k,pos:sm.index});}
    secPositions.sort((a,b)=>a.pos-b.pos);
    const parts=[];
    const pr=new RegExp(`(\\d{1,2})\\.\\s+([^(\\d][^(]{2,90}?)\\s*\\((\\d+)\\s*mins?\\.?\\)`,'gi');
    let pm;
    while((pm=pr.exec(block))!==null){
      const partNum=parseInt(pm[1]),rawTitle=pm[2].trim().replace(/\s+/g,' '),partPos=pm.index;
      let sec='T';
      for(const sp of secPositions){if(sp.pos<partPos)sec=sp.sec;}
      const isDiscurso=/discurso/i.test(rawTitle);
      const needsAsst=sec==='S'&&!isDiscurso;
      const isEstudio=/estudio\s+b[íi]blico/i.test(rawTitle);
      parts.push({id:`${i+1}-${partNum}`,n:partNum,t:rawTitle,s:sec,d:pm[3]+' min.',asst:needsAsst||isEstudio,at:null,as:null});
    }
    if(parts.length===0) continue;
    weeks.push({
      id:i+1,
      dateRange:matches[i].header.replace(/DE\s+/gi,'de ').replace(/MAYO/i,'mayo').replace(/JUNIO/i,'junio').replace(/JULIO/i,'julio').replace(/AGOSTO/i,'agosto').replace(/\s+/g,' ').toLowerCase().replace(/^\w/,c=>c.toUpperCase()),
      reading:bookMatch?bookMatch[1].trim():'',
      openSong:oSong?oSong[1]:'',closeSong:cSong?cSong[1]:'',
      presidente:null,oracion:null,parts
    });
  }
  return weeks.length>0?weeks:null;
}
